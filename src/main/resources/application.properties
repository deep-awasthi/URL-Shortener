# ── App ────────────────────────────────────────────────────────────────
spring.application.name=url-shortener
server.port=${PORT:8080}
spring.threads.virtual.enabled=true

# ── PostgreSQL ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:urlshortener}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Flyway ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:urlshortener}
spring.flyway.user=${DB_USER:postgres}
spring.flyway.password=${DB_PASSWORD:postgres}
spring.flyway.schemas=public
logging.level.org.flywaydb=INFO

# ── Redis ──────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── Kafka ──────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=url-shortener-analytics
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ── Elasticsearch ──────────────────────────────────────────────────────
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}
spring.elasticsearch.socket-timeout=2s

# ── URL Shortener ──────────────────────────────────────────────────────
urlshortener.short-code-length=${SHORT_CODE_LENGTH:10}
urlshortener.admin.token=${ADMIN_TOKEN:}

# ── JWT ────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-string-in-production-must-be-32-bytes-min}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Actuator / Metrics ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=always

# ── OpenTelemetry ──────────────────────────────────────────────────────
management.tracing.sampling.probability=1.0
otel.service.name=url-shortener
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}

# ── Resilience4j ──────────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.urlLookup.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.urlLookup.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.urlLookup.sliding-window-size=10
resilience4j.circuitbreaker.instances.urlLookup.minimum-number-of-calls=5

resilience4j.circuitbreaker.instances.elasticsearch.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.elasticsearch.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.elasticsearch.sliding-window-size=10
resilience4j.circuitbreaker.instances.elasticsearch.minimum-number-of-calls=5

resilience4j.retry.instances.dbRetry.max-attempts=3
resilience4j.retry.instances.dbRetry.wait-duration=500ms

# ── Rate Limiting ──────────────────────────────────────────────────────
ratelimit.requests-per-second=${RATE_LIMIT_API:10}
ratelimit.redirects-per-minute=${RATE_LIMIT_REDIRECT:60}
