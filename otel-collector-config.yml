receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  logging:
    loglevel: info

  # Uncomment and configure for a real tracing backend:
  # jaeger:
  #   endpoint: jaeger:14250
  #   tls:
  #     insecure: true
  # otlphttp:
  #   endpoint: http://tempo:4318

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
